<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<!-- Nunito font -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    background-color: #150d23;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 45px;
    background-color: #10001f;
    padding: 12px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
  }

  /* SIDEBAR BASE */
  .sidebar {
    position: fixed;
    top: 65px;
    left: 0;
    width: 60px;
    height: 100vh;
    background-color: #10001f;
    padding-top: 60px;
    overflow-x: hidden;
    transition: width 0.25s ease;
    z-index: 10;
  }

  /* EXPANDED SIDEBAR */
  .sidebar.open {
    width: 180px;
  }

  /* SIDEBAR ITEMS */
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    cursor: pointer;
    color: white;
    font-family: "Nunito", sans-serif;
  }

  .sidebar-item:hover {
    background-color: #30005e;
    border-radius: 8px;
  }

  /* ICONS */
  .sidebar-icon {
    width: 24px;
    height: 24px;
  }

  /* TEXT LABELS */
  .sidebar-text {
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.2s ease;
    font-size: 16px;
  }

  .sidebar.open .sidebar-text {
    opacity: 1;
  }

  .menu-icon {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .menu-icon div {
    width: 26px;
    height: 3px;
    background-color: #88719e;
    border-radius: 3px;
  }

  .center-box {
    background-color: #88719e;
    padding: 10px 16px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    color: white;
    font-size: 16px;
  }

  .center-group {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .number {
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    color: white;
    font-size: 16px;
  }

  .arrow-img {
    width: 14px;
    height: auto;
    filter: invert(1);
  }

  .settings-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .rewards-icon {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .profile-icon {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }
  .quests-icon {
    position: absolute;
    right: 140px;
    top: 50%;
    transform: translateY(-47%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .wallet-btn {
    background-color: #2ecc71;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    cursor: pointer;
    font-size: 16px;
  }

  .wallet-btn:hover {
    background-color: #28b863;
  }

  .cases-icon,
  .home-icon,
  .inventory-icon,
  .trade-icon {
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
    transform: translateY(-5%);
    width: 24px;
  }

  .settings-container {
    margin-left: 100px;
    margin-top: 120px;
    width: 300px;
    background-color: #10001f;
    padding: 20px;
    border-radius: 10px;
    font-family: "Nunito", sans-serif;
    color: white;
  }

  .settings-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 15px;
    color: #c7b2df;
  }

  .settings-label {
    font-size: 16px;
    font-weight: 700;
    color: #c7b2df;
  }

  .logout-btn {
    width: 100%;
    padding: 12px;
    background-color: #c0392b;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    margin-top: 20px;
    cursor: pointer;
  }
  .logout -btn:hover {
    background-color: #a5281e;
  }

  #levelContainer {
    position: absolute;       /* float independently in topbar */
    top: 50%;                 /* vertical center */
    left: 60%;                /* start at center of topbar */
    transform: translateX(120px) translateY(-50%); /* shift right from center */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    font-size: 14px;
  }

  #levelBarBackground {
      width: 250px; /* adjust length of bar */
      height: 10px;
      background-color: #300430;
      border-radius: 5px;
      margin-top: 4px;
      overflow: hidden;
  }

  #levelBarFill {
      width: 0%;
      height: 100%;
      background-color: #fde400;
      border-radius: 5px;
      transition: width 0.3s ease;
  }

  #levelDisplay {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;       /* lighter gray */
      margin-bottom: 4px;
      letter-spacing: 0.5px;
  }
</style>

</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu-icon" onclick="toggleSidebar()">
    <div></div><div></div><div></div>
  </div>

  <!-- Centered Money + Wallet -->
  <div class="center-group">
    <div class="center-box">
      <span id="moneyAmount">$0.00</span>
    </div>
    <button class="wallet-btn" onclick="location.href='money_transfer.html'">Wallet</button>
  </div>

  <!-- Level bar positioned to the right -->
  <div id="levelContainer">
    <span id="levelDisplay">Level: 1 | XP: 0 / 100</span>
    <div id="levelBarBackground">
      <div id="levelBarFill"></div>
    </div>
  </div>

  <!-- Settings / Rewards / Profile icons -->
  <img src="images/settings.png" class="settings-icon" onclick="location.href='settings.html'">
  <img src="images/rewards.png" class="rewards-icon" onclick="location.href='rewards.html'">
  <img src="images/profile.png" class="profile-icon" onclick="location.href='profile.html'">
  <img src="images/quests.png" class="quests-icon" onclick="location.href='quests.html'">
</div>


<!-- LEFT SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="sidebar-item" onclick="location.href='index.html'">
    <img src="images/home.png" class="home-icon">
    <span class="sidebar-text">Home</span>
  </div>

  <div class="sidebar-item">
    <img src="images/cases.png" class="cases-icon" onclick="location.href='casepage.html'">
    <span class="sidebar-text">Cases</span>
  </div>

  <div class="sidebar-item">
    <img src="images/inventory.png" class="inventory-icon" onclick="location.href='inventory.html'">
    <span class="sidebar-text">Inventory</span>
  </div>

  <div class="sidebar-item">
    <img src="images/trade.png" class="trade-icon">
    <span class="sidebar-text">Trade Ups</span>
  </div>

</div>

<div class="settings-container">

  <div class="settings-title">Profile</div>

  <!-- FIXED: now calls resetGame(), not resetSettings() -->
  <button class="logout-btn  " onclick="logoutUser()">Log Out</button>

</div>


<!-- GAME / MONEY SCRIPTS -->
<script type="module">
import { Money } from "./money.js";
</script>
<script src="auth.js"></script>
<script src="money.js"></script>
<script src="money_controls.js"></script>
<script src="kilowatt.js"></script>
<script src="recoil.js"></script>

<script type="module">
import { Money } from "./money.js";
import { Xp } from "./xp.js";
import { getLevel } from "./level.js";  

// Get UID of logged-in user
const uid = localStorage.getItem("uid"); // same as your login system

if (!uid) {
    // Not logged in, redirect to login page
    window.location.href = "login.html";
}

// Function to update the top bar
function refreshTopBarMoney(balance) {
    const el = document.getElementById('moneyAmount');
    if (el) el.textContent = Money.format(balance);
}

// Subscribe to money changes
Money.onChange(refreshTopBarMoney);

// Fetch current balance and trigger display
Money.get(uid).then(refreshTopBarMoney);

function updateLevelBar(xp) {
    const { level, currentXp, xpToNextLevel } = getLevel(xp);
    const percent = Math.min(100, (currentXp / xpToNextLevel) * 100);

    const displayEl = document.getElementById("levelDisplay");
    const fillEl = document.getElementById("levelBarFill");

    if (displayEl)
        displayEl.textContent = `Level: ${level} | XP: ${Math.floor(currentXp)} / ${Math.floor(xpToNextLevel)}`;

    if (fillEl) fillEl.style.width = percent + "%";
}

// Listen for XP changes
Xp.onChange(updateLevelBar);
Xp.get(uid).then(updateLevelBar);
</script>


<script>
function logoutUser() {
    // Clear login info
    localStorage.removeItem("uid");
    localStorage.removeItem("username");
    // Redirect to login page
    window.location.href = "login.html";
}

// Make sure it is accessible globally (in case of modules)
window.logoutUser = logoutUser;
</script>


<script>
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}


/* Money display logic */
async function refreshMoneyDisplay() {
  const balance = await Money.get(uid);
  document.getElementById("moneyAmount").textContent = Money.format(balance);
}

Money.onChange(refreshMoneyDisplay);
refreshMoneyDisplay();

</script>

</body>
</html>
