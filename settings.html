<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings</title>

<!-- Nunito Font -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* --- USE PROVIDED CSS --- */
  body {
    background-color: #150d23;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 45px;
    background-color: #10001f;
    padding: 12px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
  }

  .sidebar {
    position: fixed;
    top: 65px;
    left: 0;
    width: 60px;
    height: 100vh;
    background-color: #10001f;
    padding-top: 60px;
    overflow-x: hidden;
    transition: width 0.25s ease;
    z-index: 10;
  }

  .sidebar.open { width: 180px; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    cursor: pointer;
    color: white;
    font-family: "Nunito", sans-serif;
  }

  .sidebar-item:hover { background-color: #30005e; border-radius: 8px; }

  .sidebar-icon { width: 24px; height: 24px; filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%); }

  .sidebar-text {
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.2s ease;
    font-size: 16px;
  }

  .sidebar.open .sidebar-text { opacity: 1; }

  .menu-icon {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .menu-icon div { width: 26px; height: 3px; background-color: #88719e; border-radius: 3px; }

  .center-box {
    background-color: #88719e;
    padding: 10px 16px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    color: white;
    font-size: 16px;
  }

  .center-group {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .settings-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .rewards-icon {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .profile-icon {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }
  .quests-icon {
    position: absolute;
    right: 140px;
    top: 50%;
    transform: translateY(-47%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .wallet-btn {
    background-color: #2ecc71;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    cursor: pointer;
    font-size: 16px;
  }
  .wallet-btn:hover { background-color: #28b863; }

  .cases-icon,
  .home-icon,
  .inventory-icon,
  .trade-icon {
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
    transform: translateY(-5%);
    width: 24px;
  }

  #levelContainer {
    position: absolute;
    top: 50%;
    left: 60%;
    transform: translateX(120px) translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    font-size: 14px;
  }

  #levelBarBackground {
    width: 250px;
    height: 10px;
    background-color: #300430;
    border-radius: 5px;
    margin-top: 4px;
    overflow: hidden;
  }

  #levelBarFill {
    width: 0%;
    height: 100%;
    background-color: #fde400;
    border-radius: 5px;
    transition: width 0.3s ease;
  }

  #levelDisplay {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .settings-container {
    margin-left: 120px;
    margin-top: 120px;
    width: 300px;
    background-color: #10001f;
    padding: 20px;
    border-radius: 10px;
    font-family: "Nunito", sans-serif;
    color: white;
  }

  .settings-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 15px;
    color: #c7b2df;
  }

  .reset-btn {
    width: 100%;
    padding: 12px;
    background-color: #c0392b;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .reset-btn:hover { background-color: #a5281e; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu-icon" onclick="toggleSidebar()"><div></div><div></div><div></div></div>

  <div class="center-group">
    <div class="center-box"><span id="moneyAmount">$0.00</span></div>
    <button class="wallet-btn" onclick="location.href='money_transfer.html'">Wallet</button>
  </div>

  <div id="levelContainer">
    <span id="levelDisplay">Level: 1 | XP: 0 / 100</span>
    <div id="levelBarBackground"><div id="levelBarFill"></div></div>
  </div>

  <img src="images/settings.png" class="settings-icon" onclick="location.href='settings.html'">
  <img src="images/rewards.png" class="rewards-icon" onclick="location.href='rewards.html'">
  <img src="images/profile.png" class="profile-icon" onclick="location.href='profile.html'">
  <img src="images/quests.png" class="quests-icon" onclick="location.href='quests.html'">
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-item" onclick="location.href='index.html'">
    <img src="images/home.png" class="sidebar-icon"><span class="sidebar-text">Home</span>
  </div>
  <div class="sidebar-item" onclick="location.href='casepage.html'">
    <img src="images/cases.png" class="sidebar-icon"><span class="sidebar-text">Cases</span>
  </div>
  <div class="sidebar-item" onclick="location.href='inventory.html'">
    <img src="images/inventory.png" class="sidebar-icon"><span class="sidebar-text">Inventory</span>
  </div>
  <div class="sidebar-item" onclick="location.href='tradeup.html'">
    <img src="images/trade.png" class="sidebar-icon"><span class="sidebar-text">Trade Ups</span>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-container">
  <div class="settings-title">Settings</div>
  <button class="reset-btn" onclick="resetGame()">Reset Game</button>
</div>

<script type="module">
import { Money } from "./money.js";
import { Xp } from "./xp.js";
import { getLevel } from "./level.js";
import { supabase } from "./supabaseClient.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "login.html";

// Sidebar toggle
window.toggleSidebar = () => { document.getElementById("sidebar").classList.toggle("open"); };

// Update money display
function refreshMoney(balance) {
  document.getElementById('moneyAmount').textContent = Money.format(balance);
}
Money.onChange(refreshMoney);
Money.get(uid).then(refreshMoney);

// Update level bar
function updateLevelBar(xp) {
  const { level, currentXp, xpToNextLevel } = getLevel(xp);
  const percent = Math.min(100, (currentXp / xpToNextLevel) * 100);
  document.getElementById("levelDisplay").textContent = `Level: ${level} | XP: ${Math.floor(currentXp)} / ${Math.floor(xpToNextLevel)}`;
  document.getElementById("levelBarFill").style.width = percent + "%";
}
Xp.onChange(updateLevelBar);
Xp.get(uid).then(updateLevelBar);

// Reset game
window.resetGame = async () => {
  if (!uid) return;

  // Delete inventory items
  await supabase.from("inventory").delete().eq("user_id", uid);

  // Reset money balance
  await supabase.from("money").update({ balance: 0 }).eq("user_id", uid);

  // Reset XP
  await supabase.from("user_xp").update({ xp: 0 }).eq("user_id", uid);

  // Reset total deposited
  await supabase.from("deposit_tracker").update({ total_deposited: 0 }).eq("user_id", uid);

  // Reset quests + achievements
  await supabase.from("user_quests_progress").delete().eq("user_id", uid);
  await supabase.from("user_achievements_progress").delete().eq("user_id", uid);

  // localStorage helpers
  localStorage.removeItem(`cases_opened_${uid}`);
  localStorage.removeItem("totalDeposited");

  // IMPORTANT: Redirect to a page that reloads quests.js
  alert("Game has been reset!");
  window.location.href = "index.html";   /* <-- FIXED */
};

</script>
</body>
</html>
