<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<!-- Nunito font -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    background-color: #150d23;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #10001f;
    padding: 12px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
  }

  /* SIDEBAR BASE */
  .sidebar {
    position: fixed;
    top: 65px;
    left: 0;
    width: 60px;
    height: 100vh;
    background-color: #10001f;
    padding-top: 60px;
    overflow-x: hidden;
    transition: width 0.25s ease;
    z-index: 10;
  }

  /* EXPANDED SIDEBAR */
  .sidebar.open {
    width: 180px;
  }

  /* SIDEBAR ITEMS */
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    cursor: pointer;
    color: white;
    font-family: "Nunito", sans-serif;
  }

  .sidebar-item:hover {
    background-color: #30005e;
    border-radius: 8px;
  }

  /* ICONS */
  .sidebar-icon {
    width: 24px;
    height: 24px;
  }

  /* TEXT LABELS */
  .sidebar-text {
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.2s ease;
    font-size: 16px;
  }

  .sidebar.open .sidebar-text {
    opacity: 1;
  }

  .menu-icon {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .menu-icon div {
    width: 26px;
    height: 3px;
    background-color: #88719e;
    border-radius: 3px;
  }

  .center-box {
    background-color: #88719e;
    padding: 10px 16px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    color: white;
    font-size: 16px;
  }

  .center-group {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .number {
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    color: white;
    font-size: 16px;
  }

  .settings-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .rewards-icon {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .profile-icon {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .wallet-btn {
    background-color: #2ecc71;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    cursor: pointer;
    font-size: 16px;
  }

  .wallet-btn:hover {
    background-color: #28b863;
  }

  .cases-icon,
  .home-icon,
  .inventory-icon,
  .trade-icon {
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
    transform: translateY(-5%);
    width: 24px;
  }

  .settings-container {
    margin-left: 100px;
    margin-top: 120px;
    width: 300px;
    background-color: #10001f;
    padding: 20px;
    border-radius: 10px;
    font-family: "Nunito", sans-serif;
    color: white;
  }

  .settings-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 15px;
    color: #c7b2df;
  }

  .settings-label {
    font-size: 16px;
    font-weight: 700;
    color: #c7b2df;
  }

  .settings-select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background-color: #2a1a3f;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-family: "Nunito";
  }

  .reset-btn {
    width: 100%;
    padding: 12px;
    background-color: #c0392b;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    margin-top: 20px;
    cursor: pointer;
  }
  .reset-btn:hover {
    background-color: #a5281e;
  }

</style>

</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu-icon" onclick="toggleSidebar()">
    <div></div><div></div><div></div>
  </div>

  <div class="center-group">
    <div class="center-box">
      <span id="moneyAmount">$0.00</span>
    </div>
    <button class="wallet-btn" onclick="location.href='money_transfer.html'">Wallet</button>
    <img src="images/settings.png" class="settings-icon" onclick="location.href='settings.html'">
    <img src="images/rewards.png" class="rewards-icon" onclick="location.href='rewards.html'">
    <img src="images/profile.png" class="profile-icon" onclick="location.href='profile.html'">
  </div>
</div>


<!-- LEFT SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="sidebar-item" onclick="location.href='index.html'">
    <img src="images/home.png" class="home-icon">
    <span class="sidebar-text">Home</span>
  </div>

  <div class="sidebar-item">
    <img src="images/cases.png" class="cases-icon" onclick="location.href='casepage.html'">
    <span class="sidebar-text">Cases</span>
  </div>

  <div class="sidebar-item">
    <img src="images/inventory.png" class="inventory-icon" onclick="location.href='inventory.html'">
    <span class="sidebar-text">Inventory</span>
  </div>

  <div class="sidebar-item">
    <img src="images/trade.png" class="trade-icon">
    <span class="sidebar-text">Trade Ups</span>
  </div>

</div>

<!-- SETTINGS PANEL -->
<div class="settings-container">

  <div class="settings-title">Settings</div>

  <!-- FIXED: now calls resetGame(), not resetSettings() -->
  <button class="reset-btn" onclick="resetGame()">Reset Game</button>

</div>

<script>
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

function refreshMoneyDisplay() {
 document.getElementById('moneyAmount').textContent = Money.format(Money.get());
}
Money.onChange(refreshMoneyDisplay);

if (Money.get() === 0) {
   Money.add(0);
}
refreshMoneyDisplay();

</script>

<script type="module">
import { supabase } from "./supabaseClient.js";
import { Money } from "./money.js";

// Get logged in UID
const uid = localStorage.getItem("uid");

// --- NEW Supabase Reset Function ---
async function resetGame() {
    if (!uid) return;

    // 1. Delete all inventory items for this user
    await supabase
        .from("inventory")
        .delete()
        .eq("uid", uid);

    // 2. Reset balance to $10.00
    await Money.set(uid, 0.0);

    // 3. Refresh displayed balance
    const el = document.getElementById("moneyAmount");
    el.textContent = Money.format(0);

    // 4. Optional: Visual flash effect instead of alert
    const settingsBox = document.querySelector(".settings-container");
    settingsBox.style.boxShadow = "0 0 20px #2ecc71";
    setTimeout(() => settingsBox.style.boxShadow = "none", 600);
}

// Attach reset to the button
window.resetGame = resetGame;

// Refresh top bar balance on load
if (uid) {
    Money.get(uid).then(balance => {
        document.getElementById("moneyAmount").textContent = Money.format(balance);
    });
}
</script>



</body>
</html>
