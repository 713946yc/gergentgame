<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Money Transfer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* --- GLOBAL STYLES --- */
body { 
    background-color: #150d23; 
    margin: 0; 
    font-family: "Nunito", sans-serif; 
    color: white; 
}

/* TOP BAR */
.topbar {
    position: fixed; top: 0; left: 0; width: 100%;
    background-color: #10001f;
    padding: 12px 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 20;
}

/* Hamburger Menu */
.menu-icon {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.menu-icon div {
    width: 26px; height: 3px;
    background-color: #88719e;
    border-radius: 3px;
}

/* Money Display */
.center-box {
    background-color: #88719e;
    padding: 10px 16px;
    border-radius: 6px;
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 16px;
}

.center-group {
    display: flex; align-items: center; gap: 5px;
}

.wallet-btn {
    background-color: #2ecc71;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    font-size: 16px;
}
.wallet-btn:hover { background-color: #28b863; }

.settings-icon, .rewards-icon, .profile-icon {
    position: absolute; top: 50%;
    transform: translateY(-50%);
    width: 22px; cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg);
}
.settings-icon { right: 20px; }
.profile-icon { right: 60px; }
.rewards-icon { right: 100px; }

/* SIDEBAR */
.sidebar {
    position: fixed; top: 65px; left: 0;
    width: 60px; height: 100vh;
    background-color: #10001f;
    padding-top: 60px;
    overflow-x: hidden;
    transition: width 0.25s ease;
    z-index: 10;
}
.sidebar.open { width: 180px; }

.sidebar-item {
    display: flex; align-items: center;
    gap: 12px;
    padding: 12px 18px;
    cursor: pointer;
    color: white;
}
.sidebar-item:hover {
    background-color: #30005e;
    border-radius: 8px;
}

.sidebar-icon {
    width: 24px;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg);
}

.sidebar-text {
    opacity: 0; white-space: nowrap;
    transition: opacity 0.2s ease;
    font-size: 16px;
}
.sidebar.open .sidebar-text { opacity: 1; }

/* TRANSFER BOX */
.transfer-box {
    margin-left: 120px;
    margin-top: 150px;
    background: #1b0d2e;
    padding: 35px;
    border-radius: 14px;
    width: 420px;
    box-shadow: 0 0 20px rgba(120, 60, 200, 0.5);
}

.transfer-title {
    font-size: 27px;
    font-weight: 800;
    margin-bottom: 10px;
    color: #c8a4ff;
}

.balance-text {
    font-size: 18px;
    color: #8ae2ff;
    margin-top: 10px;
    margin-bottom: 25px;
    font-weight: 700;
}

.transfer-buttons {
    display: flex; gap: 15px;
    margin-bottom: 20px;
}

.mode-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 17px;
    border: none;
    background: #30005e;
    color: white;
}
.mode-btn.active { background: #6d35c7; }

#amountInput {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #140a22;
    color: white;
    font-size: 18px;
    margin-bottom: 20px;
    text-align: center;
    box-sizing: border-box;
}

#confirmBtn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    background: #6d35c7;
    color: white;
}
#confirmBtn:hover {
    transform: scale(1.03);
}
</style>
</head>
<body>


<!-- TOP BAR -->
<div class="topbar">
    <div class="menu-icon" onclick="toggleSidebar()">
        <div></div><div></div><div></div>
    </div>

    <div class="center-group">
        <div class="center-box">
            <span id="moneyAmount">$0.00</span>
        </div>
        <button class="wallet-btn">Wallet</button>
        <img class="settings-icon" src="images/settings.png" onclick="location.href='settings.html'">
        <img class="rewards-icon" src="images/rewards.png" onclick="location.href='rewards.html'">
        <img class="profile-icon" src="images/profile.png" onclick="location.href='profile.html'">
    </div>
</div>


<!-- SIDEBAR (FIXED VERSION WITH ICONS) -->
<div class="sidebar" id="sidebar">

    <div class="sidebar-item" onclick="location.href='index.html'">
        <img src="images/home.png" class="sidebar-icon">
        <span class="sidebar-text">Home</span>
    </div>

    <div class="sidebar-item" onclick="location.href='casepage.html'">
        <img src="images/cases.png" class="sidebar-icon">
        <span class="sidebar-text">Cases</span>
    </div>

    <div class="sidebar-item" onclick="location.href='inventory.html'">
        <img src="images/inventory.png" class="sidebar-icon">
        <span class="sidebar-text">Inventory</span>
    </div>

    <div class="sidebar-item" onclick="location.href='tradeup.html'">
        <img src="images/trade.png" class="sidebar-icon">
        <span class="sidebar-text">Trade Ups</span>
    </div>

</div>


<!-- MONEY TRANSFER BOX -->
<div class="transfer-box">
    <div class="transfer-title">Money Transfer</div>
    <div class="balance-text">Balance: <span id="moneyAmount2">$0.00</span></div>

    <div class="transfer-buttons">
        <button id="depositBtn" class="mode-btn active">Deposit</button>
        <button id="withdrawBtn" class="mode-btn">Withdraw</button>
    </div>

    <input id="amountInput" type="number" placeholder="Enter amount ($)" min="0.01" step="0.01">
    <button id="confirmBtn">DEPOSIT</button>
</div>


<!-- SCRIPT -->
<script type="module">
import { Money } from "./money.js";

// Toggle Sidebar
window.toggleSidebar = () => {
    document.getElementById("sidebar").classList.toggle("open");
};

// Get user
const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "login.html";

// Update money display
function refreshMoneyDisplay(balance) {
    document.getElementById('moneyAmount').textContent = Money.format(balance);
    document.getElementById('moneyAmount2').textContent = Money.format(balance);
}
Money.onChange(refreshMoneyDisplay);
Money.get(uid).then(refreshMoneyDisplay);

// Mode buttons
let mode = "deposit";
const depBtn = document.getElementById("depositBtn");
const witBtn = document.getElementById("withdrawBtn");
const confirmBtn = document.getElementById("confirmBtn");

depBtn.onclick = () => {
    mode = "deposit";
    depBtn.classList.add("active");
    witBtn.classList.remove("active");
    confirmBtn.textContent = "DEPOSIT";
};
witBtn.onclick = () => {
    mode = "withdraw";
    witBtn.classList.add("active");
    depBtn.classList.remove("active");
    confirmBtn.textContent = "WITHDRAW";
};

// Confirm
confirmBtn.onclick = async () => {
    let amount = parseFloat(document.getElementById("amountInput").value);
    if (!amount || amount <= 0) return;

    amount = Math.round(amount * 100) / 100;

    if (mode === "deposit") {
        await Money.add(uid, amount);
    } else {
        const current = await Money.get(uid);
        if (current < amount) return;
        await Money.sub(uid, amount);
    }

    Money.get(uid).then(refreshMoneyDisplay);
};

</script>

</body>
</html>
