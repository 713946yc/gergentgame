<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quests & Achievements</title>

<!-- Nunito font -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    background-color: #150d23;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 45px;
    background-color: #10001f;
    padding: 12px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
  }

  /* SIDEBAR BASE */
  .sidebar {
    position: fixed;
    top: 65px;
    left: 0;
    width: 60px;
    height: 100vh;
    background-color: #10001f;
    padding-top: 60px;
    overflow-x: hidden;
    transition: width 0.25s ease;
    z-index: 10;
  }

  /* EXPANDED SIDEBAR */
  .sidebar.open {
    width: 180px;
  }

  /* SIDEBAR ITEMS */
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    cursor: pointer;
    color: white;
    font-family: "Nunito", sans-serif;
  }

  .sidebar-item:hover {
    background-color: #30005e;
    border-radius: 8px;
  }

  /* ICONS */
  .sidebar-icon {
    width: 24px;
    height: 24px;
  }

  /* TEXT LABELS */
  .sidebar-text {
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.2s ease;
    font-size: 16px;
  }

  .sidebar.open .sidebar-text {
    opacity: 1;
  }

  .menu-icon {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .menu-icon div {
    width: 26px;
    height: 3px;
    background-color: #88719e;
    border-radius: 3px;
  }

  .center-box {
    background-color: #88719e;
    padding: 10px 16px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    color: white;
    font-size: 16px;
  }

  .center-group {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .number {
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    color: white;
    font-size: 16px;
  }

  .settings-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .rewards-icon {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .profile-icon {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }
  .quests-icon {
    position: absolute;
    right: 140px;
    top: 50%;
    transform: translateY(-47%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
  }

  .wallet-btn {
    background-color: #2ecc71;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    cursor: pointer;
    font-size: 16px;
  }

  .wallet-btn:hover {
    background-color: #28b863;
  }

  .cases-icon,
  .home-icon,
  .inventory-icon,
  .trade-icon {
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
    transform: translateY(-5%);
    width: 24px;
  }

  /* WELCOME TEXT */
  .welcome-msg {
    margin-left: 120px;
    margin-top: 150px;
    font-family: "Nunito", sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: white;
  }

  .username {
    color: #6ecbff; /* light blue */
    font-weight: 800;
  }

  .patchnotes-btn {
    margin-top: 25px;
    margin-left: 120px;
    background: #300430;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    font-size: 1.1rem;
    font-family: "Nunito", sans-serif;
    transition: transform 0.1s ease-in-out;
  }

  .patchnotes-btn:hover {
    transform: scale(1.05);
  }

  /* --- Suggestions Box Styles --- */
  #suggestionsContainer {
    margin-left: 120px;
    margin-top: 50px;
    max-width: 400px;
    font-family: "Nunito", sans-serif;
    color: white;
    margin-bottom: 100px;
  }

  #suggestionsContainer textarea {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    resize: none;
  }

  #suggestionsContainer button {
    margin-top: 8px;
    background: #2ecc71;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
  }

  #suggestionsList li {
    background: #300430;
    padding: 8px;
    margin-bottom: 6px;
    border-radius: 6px;
  }
  #levelContainer {
    position: absolute;       /* float independently in topbar */
    top: 50%;                 /* vertical center */
    left: 60%;                /* start at center of topbar */
    transform: translateX(120px) translateY(-50%); /* shift right from center */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    font-size: 14px;
  }

  #levelBarBackground {
    width: 250px; /* adjust length of bar */
    height: 10px;
    background-color: #300430;
    border-radius: 5px;
    margin-top: 4px;
    overflow: hidden;
  }

  #levelBarFill {
    width: 0%;
    height: 100%;
    background-color: #fde400;
    border-radius: 5px;
    transition: width 0.3s ease;
  }

  #levelDisplay {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;       /* lighter gray */
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

    .qa-title {
    margin-left: 120px;
    margin-top: 120px;
    color: #ffffff;
    font-family: "Nunito", sans-serif;
    font-size: 36px;
    font-weight: 800;
    }

    .qa-container {
    margin-left: 120px;
    margin-top: 25px;
    display: flex;
    gap: 30px;
    }

    .qa-column {
    background: #10001f;
    padding: 18px 20px;
    border-radius: 12px;
    width: 380px;
    color: #ffffff;
    font-family: "Nunito", sans-serif;
    }

    .qa-column h2 {
    font-size: 22px;
    margin-top: 0;
    margin-bottom: 16px;
    color: #c7b2df;
    }

    /* shared card style */
    .qa-card {
    background: #300430;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 12px;
    }

    .qa-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    }

    .qa-card-title {
    font-size: 15px;
    font-weight: 700;
    }

    .qa-reward {
    font-size: 12px;
    color: #f9e79f;
    }

    .qa-desc {
    font-size: 12px;
    color: #e4d7ff;
    margin-bottom: 6px;
    }

    /* progress bar */
    .qa-progress-wrapper {
    margin-top: 4px;
    }

    .qa-progress-label {
    font-size: 11px;
    margin-bottom: 3px;
    color: #b9a6e5;
    }

    .qa-progress-bar-bg {
    width: 100%;
    height: 8px;
    background: #1d0626;
    border-radius: 999px;
    overflow: hidden;
    }

    .qa-progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #fde400, #ff9f1a);
    border-radius: 999px;
    transition: width 0.25s ease;
    }

    /* completed state */
    .qa-card.completed {
    background: #144a2a;
    }

    .qa-card.completed .qa-desc {
    color: #c8f7c5;
    }

    .qa-badge-complete {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    background: #2ecc71;
    color: #0b2313;
    }



</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu-icon" onclick="toggleSidebar()">
    <div></div><div></div><div></div>
  </div>

  <!-- Centered Money + Wallet -->
  <div class="center-group">
    <div class="center-box">
      <span id="moneyAmount">$0.00</span>
    </div>
    <button class="wallet-btn" onclick="location.href='money_transfer.html'">Wallet</button>
  </div>

  <!-- Level bar positioned to the right -->
  <div id="levelContainer">
    <span id="levelDisplay">Level: 1 | XP: 0 / 100</span>
    <div id="levelBarBackground">
      <div id="levelBarFill"></div>
    </div>
  </div>

  <!-- Settings / Rewards / Profile icons -->
  <img src="images/settings.png" class="settings-icon" onclick="location.href='settings.html'">
  <img src="images/rewards.png" class="rewards-icon" onclick="location.href='rewards.html'">
  <img src="images/profile.png" class="profile-icon" onclick="location.href='profile.html'">
  <img src="images/quests.png" class="quests-icon" onclick="location.href='quests.html'">
</div>


<!-- LEFT SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-item" onclick="location.href='index.html'">
    <img src="images/home.png" class="home-icon">
    <span class="sidebar-text">Home</span>
  </div>

  <div class="sidebar-item" onclick="location.href='casepage.html'">
    <img src="images/cases.png" class="cases-icon">
    <span class="sidebar-text">Cases</span>
  </div>

  <div class="sidebar-item">
    <img src="images/inventory.png" class="inventory-icon" onclick="location.href='inventory.html'">
    <span class="sidebar-text">Inventory</span>
  </div>

  <div class="sidebar-item">
    <img src="images/trade.png" class="trade-icon">
    <span class="sidebar-text">Trade Ups</span>
  </div>
</div>

<!-- PAGE TITLE -->
<h1 class="qa-title">Quests & Achievements</h1>

<!-- MAIN 2-COLUMN LAYOUT -->
<h1 class="qa-title">Quests & Achievements</h1>

<div class="qa-container">
  <!-- LEFT: QUESTS -->
  <div class="qa-column">
    <h2>Quests</h2>
    <div id="questsList"></div>
  </div>

  <!-- RIGHT: ACHIEVEMENTS -->
  <div class="qa-column">
    <h2>Achievements</h2>
    <div id="achievementsList"></div>
  </div>
</div>



<script type="module">
import { supabase } from "./supabaseClient.js";
import { Money } from "./money.js";
import { Xp } from "./xp.js";
import { getLevel } from "./level.js";
import { initQuestsUI } from "./quests.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "login.html";

// money + level bar (same as other pages)
function refreshTopBarMoney(balance) {
  const el = document.getElementById("moneyAmount");
  if (el) el.textContent = Money.format(balance);
}
Money.onChange(refreshTopBarMoney);
Money.get(uid).then(refreshTopBarMoney);

function updateLevelBar(xp) {
  const { level, currentXp, xpToNextLevel } = getLevel(xp);
  const percent = Math.min(100, (currentXp / xpToNextLevel) * 100);
  document.getElementById("levelDisplay").textContent =
    `Level: ${level} | XP: ${Math.floor(currentXp)} / ${Math.floor(xpToNextLevel)}`;
  document.getElementById("levelBarFill").style.width = percent + "%";
}
Xp.onChange(updateLevelBar);
Xp.get(uid).then(updateLevelBar);

// sidebar toggle
window.toggleSidebar = () => {
  document.getElementById("sidebar").classList.toggle("open");
};

// init quests & achievements UI
initQuestsUI(uid);
</script>

<script src="auth.js"></script>
<script type="module">
import { Money } from "./money.js";

</script>
</body>
</html>
