<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fever Case</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
    background-color: #150d23;
    margin: 0;
    font-family: "Nunito", sans-serif;
    color: white;
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 45px;
    background-color: #10001f;
    padding: 12px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
}
.menu-icon {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.menu-icon div {
    width: 26px;
    height: 3px;
    background-color: #88719e;
    border-radius: 3px;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 65px;
    left: 0;
    width: 60px;
    height: 100vh;
    background-color: #10001f;
    padding-top: 60px;
    overflow-x: hidden;
    transition: width 0.25s ease;
    z-index: 15;
}
.sidebar.open { width: 180px; }
.sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    cursor: pointer;
    color: white;
}
.sidebar-item:hover { background-color: #30005e; border-radius: 8px; }
.sidebar-text {
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.2s ease;
    font-size: 16px;
}
.sidebar.open .sidebar-text { opacity: 1; }
.sidebar img {
    width: 24px;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
}

/* TOP RIGHT ICONS */
.settings-icon,
.rewards-icon,
.profile-icon {
    position: absolute;
    top: 50%;
    transform: translateY(-51%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
}
.settings-icon { right: 20px; }
.profile-icon { right: 60px; }
.rewards-icon { right: 100px; }
.quests-icon {
    position: absolute;
    right: 140px;
    top: 50%;
    transform: translateY(-47%);
    width: 22px;
    cursor: pointer;
    filter: invert(62%) sepia(13%) saturate(722%) hue-rotate(233deg) brightness(90%) contrast(86%);
}

/* MONEY BOX + WALLET BUTTON */
.center-group { display: flex; align-items: center; gap: 5px; }
.center-box {
  background-color: #88719e;
  padding: 10px 16px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 16px;
}
.wallet-btn {
  background-color: #2ecc71;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  font-family: "Nunito", sans-serif;
  font-weight: 700;
  cursor: pointer;
  font-size: 16px;
}
.wallet-btn:hover { background-color: #28b863; }

/* CASE PAGE CONTENT */
.page-content {
    margin-left: 0px;
    margin-top: 130px;
    text-align: center;
}
.case-container {
    width: 200px;
    margin: 0 auto 10px auto;
}
.case-img {
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.5);
}
h2 { color: #dfe9ff; font-size: 1.3rem; margin-bottom: 20px; }
.button-controls { display: flex; justify-content: center; gap: 14px; margin-bottom: 20px; }
.open-btn,
.skip-btn {
    background: #f1c40f;
    color: #111;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.1s;
}
.open-btn:hover,
.skip-btn:hover { transform: scale(1.05); }
.skip-btn { display: none; }

/* SPIN STRIP */
#stripWrap {
    width: 100%;
    max-width: 900px;
    height: 90px;
    overflow: hidden;
    margin: 0 auto;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    position: relative;
}
#strip { display: flex; height: 100%; position: absolute; left: 0; top: 0; }
.tile {
    width: 86px;
    height: 90px;
    margin-right: 4px;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    border-radius: 6px;
    opacity: 0.9;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8),
                0 0 1px rgba(255,255,255,0.1);
}
#centerLine {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 2px;
    transform: translateX(-50%);
    background-color: yellow;
    z-index: 20;
    pointer-events: none;
}
#result { 
    margin: 25px auto 0 auto;
    padding: 15px; 
    background: rgba(30, 20, 45, 0.9);
    border-radius: 10px; 
    text-align: center;
    width: 320px; 
    opacity: 0;
    transition: opacity 0.5s; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
} 
#result .title { font-weight: 800; font-size: 1.25rem; margin-bottom: 8px; } 
#result img { width: 210px; height: 140px; object-fit: cover; border-radius: 6px; margin-top: 12px; }

/* PREVIEW MODAL */
.preview-modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.75);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.preview-window {
    background: #171a21;
    width: 900px;
    max-height: 90%;
    overflow-y: auto;
    padding: 25px;
    border-radius: 10px;
    color: white;
    position: relative;
    box-shadow: 0 0 25px black;
}
.preview-close {
    position: absolute;
    top: 12px; right: 18px;
    font-size: 32px;
    cursor: pointer;
}
.preview-title {
    text-align: center;
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: 800;
}

/* Rarity Headers */
.rarity-header {
    font-size: 20px;
    font-weight: 700;
    padding: 8px 12px;
    margin-top: 30px;
    border-radius: 6px;
    text-align: center;
}

/* Rarity Grid and Cards */
.rarity-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 15px;
}
.skin-card {
    width: 150px;
    background: #1b1e26;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
    border: 2px solid transparent; /* will be set dynamically */
}
.skin-card img { width: 100%; border-radius: 4px; }
.skin-name { margin-top: 8px; font-size: 14px; font-weight: 600; text-shadow: 0 0 3px rgba(0,0,0,0.5); }

.skin-price {
    font-size: 12px;
    margin-top: 4px;
    color: #f1f1f1;
    text-shadow: 0 0 2px rgba(0,0,0,0.7);
    word-break: break-word;
}

#levelContainer {
    position: absolute;       /* float independently in topbar */
    top: 50%;                 /* vertical center */
    left: 60%;                /* start at center of topbar */
    transform: translateX(120px) translateY(-50%); /* shift right from center */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    font-size: 14px;
}

#levelBarBackground {
    width: 250px; /* adjust length of bar */
    height: 10px;
    background-color: #300430;
    border-radius: 5px;
    margin-top: 4px;
    overflow: hidden;
}

#levelBarFill {
    width: 0%;
    height: 100%;
    background-color: #fde400;
    border-radius: 5px;
    transition: width 0.3s ease;
}

#levelDisplay {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;       /* lighter gray */
    margin-bottom: 4px;
    letter-spacing: 0.5px;
}

</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu-icon" onclick="toggleSidebar()">
    <div></div><div></div><div></div>
  </div>

  <!-- Centered Money + Wallet -->
  <div class="center-group">
    <div class="center-box">
      <span id="moneyAmount">$0.00</span>
    </div>
    <button class="wallet-btn" onclick="location.href='money_transfer.html'">Wallet</button>
  </div>

  <!-- Level bar positioned to the right -->
  <div id="levelContainer">
    <span id="levelDisplay">Level: 1 | XP: 0 / 100</span>
    <div id="levelBarBackground">
      <div id="levelBarFill"></div>
    </div>
  </div>

  <!-- Settings / Rewards / Profile icons -->
  <img src="images/settings.png" class="settings-icon" onclick="location.href='settings.html'">
  <img src="images/rewards.png" class="rewards-icon" onclick="location.href='rewards.html'">
  <img src="images/profile.png" class="profile-icon" onclick="location.href='profile.html'">
  <img src="images/quests.png" class="quests-icon" onclick="location.href='quests.html'">
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-item" onclick="location.href='index.html'"><img src="images/home.png"><span class="sidebar-text">Home</span></div>
    <div class="sidebar-item" onclick="location.href='casepage.html'"><img src="images/cases.png"><span class="sidebar-text">Cases</span></div>
    <div class="sidebar-item" onclick="location.href='inventory.html'"><img src="images/inventory.png"><span class="sidebar-text">Inventory</span></div>
    <div class="sidebar-item" onclick="location.href='tradeup.html'"><img src="images/trade.png"><span class="sidebar-text">Trade Ups</span></div>
</div>

<!-- PAGE CONTENT -->
<div class="page-content">
    <div class="case-container"><img src="images/fever.webp" class="case-img"></div>
    <h2>Opening Fever Case</h2>
    <div class="button-controls">
        <button id="openBtn" class="open-btn">Open Case ($3.15)</button>
        <button id="skipBtn" class="skip-btn">Skip</button>
        <button id="previewBtn" class="open-btn" style="background:#9b59b6;">Preview Contents</button>
    </div>
    <div id="stripWrap"><div id="strip"></div><div id="centerLine"></div></div>
    <div id="result"></div>
</div>

<!-- PREVIEW MODAL -->
<div id="previewModal" class="preview-modal">
    <div class="preview-window">
        <span class="preview-close" id="previewClose">&times;</span>
        <h2 class="preview-title">Fever Case Contents</h2>
        <div id="previewWrapper"></div>
    </div>
</div>

<!-- Scripts -->
<script src="auth.js"></script>
<script type="module">
import { Money } from "./money.js";
import { initCasePage } from "./case_engine.js";
import { Xp } from "./xp.js";
import { getLevel } from "./level.js";
import { initQuestsUI } from "./quests.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "login.html";

await initQuestsUI(uid);

// ✅ Correct money display
async function refreshMoneyDisplay(balanceOverride) {
  const el = document.getElementById("moneyAmount");
  if (!el) return;

  if (typeof balanceOverride === "number") {
    el.textContent = Money.format(balanceOverride);
    return;
  }

  // ✅ IMPORTANT: pass uid so Money.get() can actually load your balance
  const balance = await Money.get(uid);
  el.textContent = Money.format(balance);
}

// ✅ Subscribe to balance changes (case opens, deposits, etc.)
Money.onChange(refreshMoneyDisplay);

// ✅ Initial load as soon as this script runs
refreshMoneyDisplay();

initCasePage({
    uid,
    Money,
    caseKey: "fever",
    skinsJsonKey: "fever",
    caseCost: 3.15,
    rarities: [
        { name: "mil_spec",         weight: 79.92, color: "#4a90e2" },
        { name: "restricted",       weight: 15.98, color: "#9b59b6" },
        { name: "classified",       weight: 3.20,  color: "#ff4dafff" },
        { name: "covert",           weight: 0.64,  color: "#e9331fff" },
        { name: "exceedingly_rare", weight: 0.26,  color: "#f1c40f" }
    ],
    elements: {
        openBtnId: "openBtn",
        skipBtnId: "skipBtn",
        stripId: "strip",
        stripWrapId: "stripWrap",
        centerLineId: "centerLine",
        resultId: "result"
    },
    stripLength: 100,
    winnerIndex: 80,
    goldRarityName: "exceedingly_rare",
    onBalanceChange: refreshMoneyDisplay
});

function updateLevelBar(xp) {
    const { level, currentXp, xpToNextLevel } = getLevel(xp);
    const percent = Math.min(100, (currentXp / xpToNextLevel) * 100);

    const displayEl = document.getElementById("levelDisplay");
    const fillEl = document.getElementById("levelBarFill");

    if (displayEl)
        displayEl.textContent = `Level: ${level} | XP: ${Math.floor(currentXp)} / ${Math.floor(xpToNextLevel)}`;

    if (fillEl) fillEl.style.width = percent + "%";
}

// Listen for XP changes
Xp.onChange(updateLevelBar);
Xp.get(uid).then(updateLevelBar);
</script>

<script>
function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); }

// RARITY COLORS
const rarityColors = {
    mil_spec: "#4a90e2",
    restricted: "#9b59b6",
    classified: "#ff4daf",
    covert: "#e9331f",
    exceedingly_rare: "#f1c40f"
};

// PREVIEW MODAL LOGIC
const previewBtn = document.getElementById("previewBtn");
const previewModal = document.getElementById("previewModal");
const previewClose = document.getElementById("previewClose");
const previewWrapper = document.getElementById("previewWrapper");

previewBtn.addEventListener("click", async () => {
    previewModal.style.display = "flex";
    const res = await fetch("skins.json");
    const data = await res.json();
    const caseData = data.fever;

    previewWrapper.innerHTML = "";
    const order = ["mil_spec","restricted","classified","covert","exceedingly_rare"];

    order.forEach(rarity => {
        if (!caseData[rarity]) return;

        const header = document.createElement("div");
        header.className = `rarity-header`;
        header.textContent =
            rarity === "exceedingly_rare"
                ? "EXCEEDINGLY RARE"
                : rarity.replace("_"," ").toUpperCase();

        header.style.color = rarityColors[rarity];
        previewWrapper.appendChild(header);

        const grid = document.createElement("div");
        grid.className = "rarity-grid";

        // ⭐ SPECIAL RULE FOR EXCEEDINGLY RARE
        if (rarity === "exceedingly_rare") {
            const card = document.createElement("div");
            card.className = "skin-card";
            card.style.border = `2px solid ${rarityColors[rarity]}`;

            // ONLY ONE MYSTERY IMAGE
            card.innerHTML = `
                <img src="images/mystery_fever.png" alt="Mystery Item">
                <div class="skin-name"
                    style="color:${rarityColors[rarity]};
                    text-shadow:0 0 6px ${rarityColors[rarity]};">
                    ★ Exceedingly Rare Knife
                </div>
            `;

            grid.appendChild(card);
            previewWrapper.appendChild(grid);
            return;
        }

        // ⭐ Normal rarities (fixed version — NO crashing)
        caseData[rarity].forEach(skin => {
            const card = document.createElement("div");
            card.className = "skin-card";
            card.style.border = `2px solid ${rarityColors[rarity]}`;

            let priceHTML = "";
            const wearOrder = ["FN", "MW", "FT", "WW", "BS"];

            wearOrder.forEach(wear => {
                if (skin.price && skin.price[wear] !== "0" && skin.price[wear] !== 0) {
                    priceHTML += `<span>${wear}: $${skin.price[wear]}</span> `;
                }
            });

            card.innerHTML = `
                <img src="${skin.image}" alt="">
                <div class="skin-name" style="
                    color:${rarityColors[rarity]};
                    text-shadow:0 0 6px ${rarityColors[rarity]};">
                    ${skin.name}
                </div>
                ${priceHTML ? `<div class="skin-price">${priceHTML}</div>` : ""}
            `;

            grid.appendChild(card);
        });

        previewWrapper.appendChild(grid);
    });
});


previewClose.addEventListener("click", ()=>{ previewModal.style.display="none"; });
window.onclick = e=>{ if(e.target===previewModal) previewModal.style.display="none"; };
</script>
</body>
</html>
